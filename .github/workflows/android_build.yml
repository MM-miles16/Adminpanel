name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Capacitor Dependencies
        run: npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Prepare Dummy Web Assets
        run: |
          mkdir -p out
          echo "<html><head><title>MM Miles Admin</title></head><body><h1>Loading...</h1></body></html>" > out/index.html

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mm-miles-admin-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
